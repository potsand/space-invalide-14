    - type: Paper
      content: Пожелтевший от старости лист, грязный и пыльный, испачканный давным-давно засохшими каплями жёлтой крови, и, скорее всего, горьких слёз. Подчерк тяжело разобрать, в частности потому что у писавшего его не только дрожали руки, но и были серьёзные проблемы с грамматикой. В ходе чтения вам удаётся понять что написавшим был милк, совсем малых лет. Персонал комплекса приказал ему лежал на резиновом коврике пока вокруг него выкладывали и укладывали камни, чему он никак не мог противеться, после же, когда заделали последнюю дыру и свет от осветительных приборов перестал проникать в "комнату", он окончательно понял, что это его столь несправедливый конец. После же тот обращается по совсем вам незнакомым номерам, называя их лучшими друзьями, желая им всего наилучшего и чтобы с ними не произошло подобного, как с ним. В конце последнего предложения тот нарисовал смайлик в виде мордочки эксперемента, что радостно улыбается и подмигивает - прямо под ним была одна из самых крупных жёлтых пятен. На обратной стороне листа как оказалось было признание в любви к голубому вертолётику, какой ему разрешили оставить - и также, заметка, что ему кажется что он здесь не один и кто то пытается укусить его за шею.
