        Раз дело приняло приятный оборот -

        Чем чёрт не шутит - может выпить чаю?

        Но только знайте: я ведь презираю

        Весь ваш палачий, ненасытный род


        "Не ворошите грязное бельё,

        Я сам к палачеству пристрастья не питаю,

        Но вы войдите в положение моё -

        Я здесь на службе состою, я здесь пытаю


        И не людям, прости,

        Счёт веду - головам

        Ваш удел - не ахти,

        Не завидую вам


