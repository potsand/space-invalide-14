    - type: Paper
      content: >-
        Будет нелёгким этот полёт,

        Ты это знаешь сам...

        Скажешь друзьям: "Всегда мне везёт!"

        Но как же непросто идти вперёд,

        Зная, что встретишь там.


        Бешеных молний крутой зигзаг,

        Чёрного вихря взлёт...

        Злое пламя слепит глаза,

        Но, если ты повернёшь назад,

        Кто же пойдёт вперёд?


        Нет, не прорваться сквозь огненный ад,

        Ты это видишь сам...

        И отступать ты, конечно, не рад,

        Но как же непросто вернуться назад,

        Зная, что встретишь там.


        Чужая улыбка, недобрый взгляд,

        Губы скривил пилот...

        "Струсил, десантник!" - тебе говорят,

        Но, если бы ты не вернулся назад,

        Кто бы пошёл вперёд?


        Случайно найдя её в книге, при прочтении я ощутила истинную жалость к их прекрасной, полной приключений профессии - исполняя свой долг, не забывая о инстинкте самосохранения и здравом смысле, они раз за разом сталкивались с тем, что их честь порочили менее складные в плане ума братья по расе, и ничего не в силах с этим сделать, отвечали про себя, - Если бы ты не вернулся назад, кто бы пошёл вперёд?
  - uid: 14036
    components:
    - type: Transform
      pos: 56.49407,23.624866
      parent: 2
    - type: Paper
      content: >-
        Ваше благородие, госпожа разлука,

        Мне с тобою холодно вот какая штука.

        Письмецо в конверте погоди, не рви...

        Не везёт мне в смерти повезет в любви!


        Ваше благородие, госпожа удача,

        Для кого ты добрая, а кому иначе.

        Девять граммов в сердце постой не зови...

        Не везёт мне в смерти повезет в любви!


        Ваше благородие, госпожа чужбина,

        Жарко обнимала ты, да только не любила.

        В шёлковые сети постой, не лови...

        Не везёт мне в смерти повезет в любви!


        Ваше благородие, госпожа победа,

        Значит, моя песенка до конца не спета.

        Перестаньте, черти, клясться на крови...

        Не везёт мне в смерти повезет в любви!


        В столь широком ассортименте книг и возможности время от времени поглядывать совершенно разные передачи на телевизоре мною была найдена очередная песня что засела у меня в извилинах. Тонкая красота игры на гитаре приправленная меланхолично-весёлым исполнением, и будучи откровенным, сея строки напоминают мне меня.
