        Я смотрю делово -

        Говори что хочу,

        Обзывай хоть кого

        Говори что хочу,

        Обзывай хоть кого"



        Он был обсыпан белой перхотью, как содой,

        И говорил, сморкаясь в старое пальто:

        "Приговорённый обладает, как никто,

        Свободой слова, то есть подлинной свободой"


        И я избавился от острой неприязни

        И посочувствовал дурной его судьбе

        "Как жизнь?" - спросил меня палач - "Да так себе..." -

        Спросил бы лучше он: как смерть за час до казни?


        "Ах, прощенья прошу" -

        Важно знать палачу,

        Что, когда я вишу

        И ногами сучу


        Да у плахи сперва

        Хорошо б подмели,

        Чтоб моя голова

        Не валялась в пыли

        Чтоб моя голова

        Не валялась в пыли



        Чай закипел, положен сахар по две ложки...

        "Спасибо!" - "Что вы! Не извольте возражать!

        Вам скрутят ноги, чтоб сученья избежать,

        А грязи нет - у нас ковровые дорожки"


        "Ах, да неужто ли подобное возможно!"

        Он от умиленья всплакнул и лёг ничком

        Потрогав шею мне легко и осторожно

        Он одобрительно поцокал языком


        И шепнул: "Ни гугу!

        Здесь кругом стукачи

        Чем смогу - помогу,

        Только ты не молчи


        Стану ноги пилить -

        Можешь ересь болтать,

        Чтобы казнь отдалить,

        Буду дольше пытать

        Чтобы казнь отдалить,

        Буду дольше пытать"



        Вся ночь перед казнью - для души отдохновенье,

        И я уже дождаться утра не могу!

        Когда он станет жечь меня и гнуть в дугу,

        Я крикну весело: "Остановись, мгновенье!"


        "Чтоб стоны с воплями остались на губах,

        Какую музыку" - спросил он - "Дать при этом?

        Я, признаюсь, питаю слабость к менуэтам,

        Но есть в коллекции у нас и Оффенбах


        Будет больно - поплачь,

        Если невмоготу" -

        Намекнул мне палач

        "Хорошо, я учту"


        Подбодрил меня он,

        Правда, сам загрустил -

        Помнят тех, кто казнён,

        А не тех, кто казнил

        Помнят тех, кто казнён,

        А не тех, кто казнил



        Развлёк про гильотину анекдотом,

        Назвав её лишь подражаньем топору

        Он посочувствовал французкому двору

        И не казнённым, а убитым гугенотам


        Жалел о том, что кол в России упразднён,

        Был оживлён и сыпал датами привычно

        Он знал доподлинно - кто, где и как казнён,

        И горевал о тех, над кем работал лично


        "Раньше" - он говорил -

        "Я дровишки рубил,

        Я и стриг, я и брил,

        И с ружьишком ходил


        Тратил пыл в пустоту

        И губил свой талант,

        А на этом посту

        Повернулось назад"



        Некстати вспомнил дату смерти Пугачёва -

        Рубил, должно быть, для надёжности, рукой

        И в то же время знать не знал, кто он такой -

        Невелико образованье палачёво


        Парок над чаем тонкой змейкою извивался,

        Он дул на воду, грея руки о стекло

        Об инквизиции с почтеньем отзывался

        И об опричне - особенно тепло


        Мы гоняли чаи,

        Вдруг палач зарыдал -

        Дескать, жертвы мои

        Все идут на скандал


        Ах, вы тяжкие дни,

        Палачёва стерня

        Ну зачем же они

        Ненавидят меня!

        Ну зачем же они

        Ненавидят меня!



        Он мне поведал назначенье инструментов -

        Там всё не страшно, и палач, как добрый врач

        Но на работе до поры всё это прячь,

        Чтоб понапрасну не нервировать клиентов


        Бывало, только в чувство приведёшь,

        Водой окатишь, врубишь Оффенбаха,

        А он примерится, когда ты подойдёшь,

        Возьмёт и плюнет - и испорчена рубаха


        Накричали речей

        Мы за клан палачей

        Мы за клан палачей

        Пили чай - чай, ничей


        Я совсем обалдел,

        Чуть не лопнул, крича

        Я орал: "Кто посмел

        Обижать палача?!"

        Я орал: "Кто посмел

        Обижать палача?!"



        Снижило веки мне предсмертная усталость,

        Уже светало, наше время истекло,

        Но мне хотябы перед смертью повезло -

        Такую ночь провёл, не каждому досталось!


        Он пожелал мне доброй ночи на прощанье,

        Согнал назойливую муху мне с плеча

        Как жаль - не долго мне хранить воспоминанья

        И образ доброго, чудного палача


        Dm       

        Ах, зачем эта ночь

        Am   

        Так была хороша!
                             E7
        Не болела бы грудь,
                  Am  Am6
        Не стонала б душа...


        Баллада о палаче - столь дивное произведение полное смысла и словно, моего скорейшего будущего... "Ты не бойся, я не врач - я твой верный палач!" Вклинились в мою память и раненое сердце, пожалуй, раз и навсегда, до той степени, что становится дурно, и кругом идёт голова в деле повторения и самостоятельных попыток пения.
