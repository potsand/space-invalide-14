- type: entity
  save: false
  parent: BaseMobSpeciesOrganic
  id: MobOrange
  name: Урист МакАпельсин
  components:
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: full
  - type: HumanoidAppearance
    species: Orange
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Body
    prototype: Orange
  - type: Vocal
    sounds:
      Male: MaleSpeciman
      Unsexed: MaleSpeciman
      Female: FemaleSpeciman
  - type: Speech
    speechSounds: MaleSpeciman
    allowedEmotes: [ 'Bark', 'Growl' ]
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodYellowMeat
      amount: 6
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#FFCC00"
  - type: MeleeWeapon
    attackRate: 1.75
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
        Structural: 5
  - type: MobThresholds
    thresholds:
      0: Alive
      130: Critical
      260: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      95: 0.7
      115: 0.5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: YellowBlood
        Quantity: 350
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Speciman
  - type: Temperature
    heatDamageThreshold: 335
    coldDamageThreshold: 240
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      273: 0.85
      260: 0.75
      240: 0.65
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 100
    damage:
      types:
        Heat: -0.05
        Cold: -0.06
        Shock: -0.03
      groups:
        Brute: -0.08
        Toxin: -0.05
  - type: Stamina
    baseCritThreshold: 135
    decay: 4
  - type: Hunger
    baseDecayRate: 0.046
    starvationDamage:
      types:
        Bloodloss: 0.75
        Cold: 0.05
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 200
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Thirst
    baseDecayRate: 0.22
  - type: Tag
    tags:
    - FootstepSound
    - DoorBumpOpener
    - SpecimanCraft
    - AnomalyHost
  - type: Sharp
  - type: Inventory
    speciesId: Orange
    templateId: speciman
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: outerwear
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hand
      belt:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: belt

- type: entity
  parent: BaseSpeciesDummy
  id: MobOrangeDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: Orange
