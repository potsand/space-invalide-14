- type: entity
  save: false
  parent: BaseMobSpeciesOrganic
  id: MobDune
  name: Урист МакЗубастик
  components:
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Dune/parts.rsi
    state: full
  - type: HumanoidAppearance
    species: Dune
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Body
    prototype: Dune
  - type: Vocal
    sounds:
      Male: MaleSpeciman
      Unsexed: MaleSpeciman
      Female: FemaleSpeciman
  - type: Speech
    speechSounds: MaleSpeciman
    allowedEmotes: [ 'Bark', 'Growl' ]
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodYellowMeat
      amount: 5
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#FFCC00"
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 4
        Slash: 7
        Structural: 10
  - type: MobThresholds
    thresholds:
      0: Alive
      115: Critical
      230: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      75: 0.7
      95: 0.5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: YellowBlood
        Quantity: 300
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Speciman
  - type: Temperature
    heatDamageThreshold: 335
    coldDamageThreshold: 250
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      293: 0.85
      280: 0.75
      260: 0.65
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 20
    damage:
      types:
        Heat: -0.03
        Cold: -0.02
        Shock: -0.01
      groups:
        Brute: -0.04
        Toxin: -0.02
  - type: Stamina
    baseCritThreshold: 120
    decay: 4
  - type: Hunger
    baseDecayRate: 0.047
    starvationDamage:
      types:
        Bloodloss: 0.7
        Cold: 0.05
  - type: Thirst
    baseDecayRate: 0.22
  - type: Tag
    tags:
    - FootstepSound
    - DoorBumpOpener
    - SpecimanCraft
    - AnomalyHost
  - type: Sharp
  - type: Inventory
    speciesId: Dune
    templateId: speciman
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: outerwear
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hand
      belt:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: belt

- type: entity
  parent: BaseSpeciesDummy
  id: MobDuneDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: Dune
